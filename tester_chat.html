<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoPrompt Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0f0a;
    --surface: #111811;
    --border: #1e2a1e;
    --green: #00ff87;
    --green-dim: #00c86a;
    --green-muted: rgba(0,255,135,0.08);
    --text: #e8f5e8;
    --text-dim: #7a9a7a;
    --red: #ff4d4d;
    --red-muted: rgba(255,77,77,0.1);
    --amber: #ffb800;
    --amber-muted: rgba(255,184,0,0.1);
    --blue: #4a9eff;
    --blue-muted: rgba(74,158,255,0.1);
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--green);
  }

  nav a {
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
  }
  nav a:hover { color: var(--green); border-color: var(--green-dim); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .clear-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  .clear-btn:hover { color: var(--red); border-color: var(--red); }

  /* Config panel */
  .config {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .config input[type="text"],
  .config input[type="password"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
  }

  .config input#proxyUrl { width: 200px; }
  .config input#apiKey { width: 220px; }

  .toggles {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }
  .toggles label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }
  .toggles input[type="checkbox"] { width: auto; }

  /* Chat window */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .empty-state .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .example-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  .example-btn:hover { border-color: var(--green-dim); color: var(--green); }

  /* Message bubbles */
  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 75%;
  }

  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 13.5px;
  }

  .user .bubble {
    background: var(--green-muted);
    border: 1px solid var(--green-dim);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .bubble h3, .bubble h4 {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--green);
    font-size: 13px;
    margin: 14px 0 6px;
  }
  .bubble h3:first-child, .bubble h4:first-child { margin-top: 0; }
  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 0 0 10px 18px; }
  .bubble li { margin-bottom: 3px; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .bubble code {
    background: var(--green-muted);
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .bubble strong { color: var(--white); }

  .msg-meta {
    display: flex;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 600;
  }
  .badge.simple  { background: var(--green-muted); color: var(--green); }
  .badge.medium  { background: var(--amber-muted); color: var(--amber); }
  .badge.complex { background: var(--blue-muted);  color: var(--blue); }
  .badge.hit     { background: var(--green-muted); color: var(--green); }
  .badge.miss    { background: var(--border); color: var(--text-dim); }
  .badge.none    { background: var(--border); color: var(--text-dim); }

  .meta-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .cache-banner {
    background: var(--green-muted);
    border: 1px solid var(--green-dim);
    color: var(--green);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    margin-bottom: 6px;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }
  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Error bubble */
  .error-bubble {
    background: var(--red-muted);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    align-self: flex-start;
    max-width: 75%;
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    flex-shrink: 0;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-area textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    padding: 12px 16px;
    resize: none;
    line-height: 1.5;
    max-height: 160px;
    overflow-y: auto;
    outline: none;
  }

  .input-area textarea:focus {
    border-color: var(--green-dim);
  }

  .input-area textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--green);
    color: #06120a;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .send-btn:hover { background: var(--green-dim); }
  .send-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 0 24px 10px;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <span class="logo">EcoPrompt</span>
  <nav><a href="/dashboard">← Dashboard</a></nav>
  <div class="header-right">
    <button class="clear-btn" id="clearBtn">Clear chat</button>
  </div>
</header>

<div class="config">
  <input type="text" id="proxyUrl" placeholder="Proxy URL" value="http://localhost:8000">
  <input type="password" id="apiKey" placeholder="Groq API key (gsk_...)">
  <div class="toggles">
    <label><input type="checkbox" id="useCache" checked> cache</label>
    <label><input type="checkbox" id="useCompress" checked> compress</label>
    <label><input type="checkbox" id="useRoute" checked> route</label>
  </div>
</div>

<div class="chat-window" id="chatWindow">
  <div class="empty-state" id="emptyState">
    <div>Start a conversation with EcoPrompt</div>
    <div class="examples">
      <button class="example-btn" data-text="What is the capital of France?">simple example</button>
      <button class="example-btn" data-text="Explain how photosynthesis works and why it matters for the food chain.">medium example</button>
      <button class="example-btn" data-text="Write a Python function that implements binary search, then explain its time complexity step by step.">complex example</button>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="promptInput" placeholder="Message EcoPrompt..." rows="1"></textarea>
  <button class="send-btn" id="sendBtn">Send</button>
</div>
<div class="input-hint">Enter to send · Shift+Enter for new line</div>

<script>
  const $ = id => document.getElementById(id);
  const chatWindow = $('chatWindow');
  const promptInput = $('promptInput');
  const sendBtn = $('sendBtn');

  // Conversation history — full message array sent to API each time
  let history = [];
  let isLoading = false;

  // Persist config
  $('proxyUrl').value = localStorage.getItem('eco_proxy') || 'http://localhost:8000';
  $('apiKey').value = localStorage.getItem('eco_key') || '';
  $('proxyUrl').addEventListener('change', () => localStorage.setItem('eco_proxy', $('proxyUrl').value));
  $('apiKey').addEventListener('change', () => localStorage.setItem('eco_key', $('apiKey').value));

  // Auto-resize textarea
  promptInput.addEventListener('input', () => {
    promptInput.style.height = 'auto';
    promptInput.style.height = Math.min(promptInput.scrollHeight, 160) + 'px';
  });

  // Enter to send, Shift+Enter for new line
  promptInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) send();
    }
  });

  // Example buttons
  document.querySelectorAll('.example-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      promptInput.value = btn.dataset.text;
      promptInput.focus();
      promptInput.dispatchEvent(new Event('input'));
    });
  });

  // Clear chat
  $('clearBtn').addEventListener('click', () => {
    history = [];
    chatWindow.innerHTML = '';
    chatWindow.appendChild($('emptyState') || createEmptyState());
    showEmpty();
  });

  function showEmpty() {
    if (!$('emptyState')) {
      const el = document.createElement('div');
      el.className = 'empty-state';
      el.id = 'emptyState';
      el.innerHTML = `<div>Start a conversation with EcoPrompt</div>
        <div class="examples">
          <button class="example-btn" data-text="What is the capital of France?">simple example</button>
          <button class="example-btn" data-text="Explain how photosynthesis works and why it matters for the food chain.">medium example</button>
          <button class="example-btn" data-text="Write a Python function that implements binary search, then explain its time complexity step by step.">complex example</button>
        </div>`;
      el.querySelectorAll('.example-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          promptInput.value = btn.dataset.text;
          promptInput.focus();
        });
      });
      chatWindow.appendChild(el);
    }
  }

  function hideEmpty() {
    const el = $('emptyState');
    if (el) el.remove();
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function stripReasoning(content) {
    if (!content) return content;
    let cleaned = content.replace(/<think>[\s\S]*?<\/think>/g, '');
    const openIdx = cleaned.indexOf('<think>');
    if (openIdx !== -1) cleaned = cleaned.slice(0, openIdx);
    return cleaned.trim();
  }

  function renderMarkdown(text) {
    if (!text) return '';
    let src = escapeHtml(text);
    src = src.replace(/^\s*---+\s*$/gm, '<hr>');
    src = src.replace(/^#### (.*)$/gm, '<h4>$1</h4>');
    src = src.replace(/^### (.*)$/gm, '<h4>$1</h4>');
    src = src.replace(/^## (.*)$/gm, '<h3>$1</h3>');
    src = src.replace(/^# (.*)$/gm, '<h3>$1</h3>');
    src = src.replace(/`([^`]+)`/g, '<code>$1</code>');
    src = src.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    const lines = src.split('\n');
    const out = [];
    let listType = null;
    const flushList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };
    for (const line of lines) {
      const ulMatch = line.match(/^\s*[-*]\s+(.*)$/);
      const olMatch = line.match(/^\s*(\d+)\.\s+(.*)$/);
      if (ulMatch) {
        if (listType !== 'ul') { flushList(); out.push('<ul>'); listType = 'ul'; }
        out.push(`<li>${ulMatch[1]}</li>`);
      } else if (olMatch) {
        if (listType !== 'ol') { flushList(); out.push(`<ol start="${olMatch[1]}">`); listType = 'ol'; }
        out.push(`<li>${olMatch[2]}</li>`);
      } else {
        flushList();
        out.push(line);
      }
    }
    flushList();
    src = out.join('\n');

    const blockTagRe = /^<(h[1-6]|ul|ol|li|\/ul|\/ol|hr)/;
    const out2 = [];
    let para = [];
    const flushPara = () => { if (para.length) { out2.push(`<p>${para.join(' ')}</p>`); para = []; } };
    for (const line of src.split('\n')) {
      const trimmed = line.trim();
      if (!trimmed) { flushPara(); continue; }
      if (blockTagRe.test(trimmed)) { flushPara(); out2.push(trimmed); continue; }
      para.push(trimmed);
    }
    flushPara();
    return out2.join('\n');
  }

  function badge(text, cls) {
    return `<span class="badge ${cls}">${text}</span>`;
  }

  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `<div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row assistant typing';
    row.id = 'typingIndicator';
    row.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const el = $('typingIndicator');
    if (el) el.remove();
  }

  function appendAssistantMessage(content, meta) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';

    const isHit = meta.cacheStatus === 'hit';
    const cacheBanner = isHit
      ? `<div class="cache-banner">⚡ Served from cache — instant and free</div>`
      : '';

    const metaHtml = isHit
      ? `<div class="msg-meta">
           ${badge('hit', 'hit')}
           <span class="meta-text">${meta.roundtripMs}ms</span>
         </div>`
      : `<div class="msg-meta">
           ${badge(meta.tier || 'none', meta.tier || 'none')}
           <span class="meta-text">${meta.model || ''}</span>
           ${badge('miss', 'miss')}
           <span class="meta-text">${meta.roundtripMs}ms · ${meta.tokensIn ?? '–'}↑ ${meta.tokensOut ?? '–'}↓</span>
         </div>`;

    row.innerHTML = `
      ${cacheBanner}
      <div class="bubble">${renderMarkdown(content)}</div>
      ${metaHtml}
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function appendError(msg) {
    const el = document.createElement('div');
    el.className = 'error-bubble';
    el.textContent = '⚠ ' + msg;
    chatWindow.appendChild(el);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function send() {
    const proxyUrl = $('proxyUrl').value.replace(/\/$/, '');
    const apiKey = $('apiKey').value.trim();
    const prompt = promptInput.value.trim();

    if (!prompt) return;
    if (!apiKey) { appendError('Enter your Groq API key in the config bar above.'); return; }

    hideEmpty();
    appendUserMessage(prompt);
    promptInput.value = '';
    promptInput.style.height = 'auto';

    // Add to history
    history.push({ role: 'user', content: prompt });

    isLoading = true;
    sendBtn.disabled = true;
    appendTyping();

    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
      'x-ecoprompt-cache': $('useCache').checked ? 'true' : 'false',
      'x-ecoprompt-compress': $('useCompress').checked ? 'true' : 'false',
      'x-ecoprompt-route': $('useRoute').checked ? 'true' : 'false',
    };

    const started = performance.now();
    try {
      const res = await fetch(`${proxyUrl}/v1/chat/completions`, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          model: 'groq/llama-3.1-8b-instant',
          messages: history,  // send full history every time
        }),
      });

      const roundtripMs = Math.round(performance.now() - started);
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        const msg = data?.error?.message || `HTTP ${res.status}`;
        appendError(msg);
        history.pop(); // remove the failed user message
      } else {
        const rawContent = data.choices?.[0]?.message?.content ?? '';
        const content = stripReasoning(rawContent);

        const meta = {
          cacheStatus: res.headers.get('x-ecoprompt-cache') || 'miss',
          tier: res.headers.get('x-ecoprompt-route-tier') || 'none',
          model: res.headers.get('x-ecoprompt-routed-model') || '',
          tokensIn: data.usage?.prompt_tokens,
          tokensOut: data.usage?.completion_tokens,
          roundtripMs,
        };

        appendAssistantMessage(content, meta);

        // Add assistant response to history for next turn
        history.push({ role: 'assistant', content });
      }
    } catch (err) {
      removeTyping();
      appendError('Could not reach the proxy. Is uvicorn running?');
      history.pop();
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      promptInput.focus();
    }
  }

  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
